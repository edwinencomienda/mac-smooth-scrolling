name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  sign-and-release:
    runs-on: macos-14
    timeout-minutes: 30

    env:
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: ci-temp-keychain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME" >/dev/null
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"
          rm -f "$CERT_PATH"

      - name: Detect signing identity
        run: |
          set -euo pipefail
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" \
            | grep "Developer ID Application" \
            | head -n 1 \
            | sed -E 's/.*"(.+)"$/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found in keychain." >&2
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Generate .env.prod
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          cat > .env.prod <<EOF
          SIGN_IDENTITY=$SIGN_IDENTITY
          APPLE_API_KEY=$APPLE_API_KEY_PATH
          APPLE_API_KEY_ID=$APPLE_API_KEY_ID
          APPLE_API_ISSUER=$APPLE_API_ISSUER
          EOF

      - name: Sign and notarize
        run: make sign

      - name: Create DMG
        run: make dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacSmoothScroll
          path: |
            .build/MacSmoothScroll.dmg
            .build/MacSmoothScroll.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/MacSmoothScroll.dmg
            .build/MacSmoothScroll.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" .env.prod
