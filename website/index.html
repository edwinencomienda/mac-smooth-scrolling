<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Smooth Scrolling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #020203;
      --bg-base: #050506;
      --bg-elevated: #0a0a0c;
      --surface: rgba(255, 255, 255, 0.05);
      --foreground: #EDEDEF;
      --foreground-muted: #8A8F98;
      --accent: #22C55E;
      --accent-glow: rgba(34, 197, 94, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --easing: cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] {
      --bg-deep: #f2f2f5;
      --bg-base: #ffffff;
      --bg-elevated: #e8e8ec;
      --surface: rgba(0, 0, 0, 0.04);
      --foreground: #1d1d1f;
      --foreground-muted: #6e6e73;
      --accent: #22C55E;
      --accent-glow: rgba(34, 197, 94, 0.2);
      --border: rgba(0, 0, 0, 0.08);
    }

    [data-theme="light"] h1 {
      background: linear-gradient(180deg, #1d1d1f 0%, rgba(0, 0, 0, 0.65) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    [data-theme="light"] body::before,
    [data-theme="light"] body::after {
      opacity: 0.1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-deep);
      color: var(--foreground);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient blobs */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.08;
      animation: float 12s ease-in-out infinite;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: var(--accent);
      top: -100px;
      right: -100px;
    }

    body::after {
      width: 300px;
      height: 300px;
      background: #5E6AD2;
      bottom: -80px;
      left: -80px;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.1); }
    }

    .hero {
      max-width: 520px;
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* App icon */
    .app-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 2rem;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border);
      animation: logoEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s var(--easing) 0.1s both;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--foreground-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      font-weight: 400;
      animation: fadeUp 0.8s var(--easing) 0.2s both;
    }

    .cta-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 0.8s var(--easing) 0.3s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s var(--easing);
      box-shadow: 0 0 24px var(--accent-glow);
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(34, 197, 94, 0.25);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.625rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.8125rem;
      color: var(--foreground-muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .author {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      animation: fadeUp 0.8s var(--easing) 0.5s both;
    }

    .author a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--foreground-muted);
      text-decoration: none;
      font-size: 0.8125rem;
      transition: color 0.2s var(--easing);
    }

    .author a:hover {
      color: var(--foreground);
    }

    .author-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .author-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .author-text span {
      color: var(--foreground);
      font-weight: 500;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 10;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--foreground-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s var(--easing);
      animation: fadeUp 0.8s var(--easing) 0.1s both;
    }

    .theme-toggle:hover {
      color: var(--foreground);
      border-color: var(--foreground-muted);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }
    [data-theme="light"] .theme-toggle .sun { display: block; }
    [data-theme="light"] .theme-toggle .moon { display: none; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes logoEntrance {
      0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
      50%  { transform: scale(1.15) rotate(2deg); }
      70%  { transform: scale(0.92) rotate(-1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .hero { padding: 1.5rem; }
      .app-icon { width: 80px; height: 80px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle theme">
    <svg class="sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
    </svg>
    <svg class="moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
    </svg>
  </button>
  <main class="hero">
    <div class="app-icon">
      <img src="app-icon.png" alt="Mac Smooth Scrolling app icon" width="96" height="96">
    </div>
    <h1>Mac Smooth Scrolling</h1>
    <p class="subtitle">Fluid, natural scrolling that feels the way your Mac should.</p>
    <div class="cta-row">
      <a class="btn" href="#" aria-label="Download Mac Smooth Scrolling" id="download-link">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Download
      </a>
      <div class="badge">macOS 13+ · Apple Silicon & Intel</div>
    </div>
    <div class="author">
      <a href="https://github.com/edwinencomienda" target="_blank" rel="noopener noreferrer">
        <div class="author-avatar">
          <img src="https://github.com/edwinencomienda.png" alt="" width="28" height="28">
        </div>
        <div class="author-text">Built by <span>Edwin Encomienda</span></div>
      </a>
    </div>
  </main>
  <script>
    // Theme toggle
    (function() {
      const stored = localStorage.getItem('theme');
      const pref = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      const theme = stored || pref;
      document.documentElement.setAttribute('data-theme', theme);

      document.querySelector('.theme-toggle').addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();

    // GitHub release fetch
    fetch('https://api.github.com/repos/edwinencomienda/mac-smooth-scrolling/releases/latest')
      .then(r => r.json())
      .then(release => {
        const asset = release.assets.find(a => a.name.endsWith('.dmg'));
        if (asset) document.getElementById('download-link').href = asset.browser_download_url;
      })
      .catch(() => {});
  </script>
</body>
</html>
