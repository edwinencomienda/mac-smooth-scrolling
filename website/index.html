<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac Smooth Scrolling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #020203;
      --bg-base: #050506;
      --bg-elevated: #0a0a0c;
      --surface: rgba(255, 255, 255, 0.05);
      --foreground: #EDEDEF;
      --foreground-muted: #8A8F98;
      --accent: #22C55E;
      --accent-glow: rgba(34, 197, 94, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --easing: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-deep);
      color: var(--foreground);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient blobs */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.08;
      animation: float 12s ease-in-out infinite;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: var(--accent);
      top: -100px;
      right: -100px;
    }

    body::after {
      width: 300px;
      height: 300px;
      background: #5E6AD2;
      bottom: -80px;
      left: -80px;
      animation-delay: -6s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.1); }
    }

    .hero {
      max-width: 520px;
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* App icon */
    .app-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 2rem;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border);
      animation: fadeDown 0.8s var(--easing) both;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s var(--easing) 0.1s both;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--foreground-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      font-weight: 400;
      animation: fadeUp 0.8s var(--easing) 0.2s both;
    }

    .cta-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeUp 0.8s var(--easing) 0.3s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s var(--easing);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(34, 197, 94, 0.25);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.625rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.8125rem;
      color: var(--foreground-muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .author {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      animation: fadeUp 0.8s var(--easing) 0.5s both;
    }

    .author a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--foreground-muted);
      text-decoration: none;
      font-size: 0.8125rem;
      transition: color 0.2s var(--easing);
    }

    .author a:hover {
      color: var(--foreground);
    }

    .author-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .author-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .author-text span {
      color: var(--foreground);
      font-weight: 500;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .hero { padding: 1.5rem; }
      .app-icon { width: 80px; height: 80px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="app-icon">
      <img src="app-icon.png" alt="Mac Smooth Scrolling app icon" width="96" height="96">
    </div>
    <h1>Mac Smooth Scrolling</h1>
    <p class="subtitle">Fluid, natural scrolling that feels the way your Mac should.</p>
    <div class="cta-row">
      <button class="btn" aria-label="Download Mac Smooth Scrolling">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Download
      </button>
      <div class="badge">macOS 13+ · Apple Silicon & Intel</div>
    </div>
    <div class="author">
      <a href="https://github.com/edwinencomienda" target="_blank" rel="noopener noreferrer">
        <div class="author-avatar">
          <img src="https://github.com/edwinencomienda.png" alt="" width="28" height="28">
        </div>
        <div class="author-text">Built by <span>Edwin Encomienda</span></div>
      </a>
    </div>
  </main>
</body>
</html>
